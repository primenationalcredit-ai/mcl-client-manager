<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCL Client Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root {
  --navy:#003f87; --navy-dark:#002d63; --navy-light:#e8f0fa;
  --gold:#c9952b; --gold-light:#fef9ef;
  --red:#dc2626; --red-light:#fef2f2;
  --green:#16a34a; --green-light:#f0fdf4;
  --g50:#f9fafb; --g100:#f3f4f6; --g200:#e5e7eb; --g300:#d1d5db;
  --g400:#9ca3af; --g500:#6b7280; --g600:#4b5563; --g700:#374151;
  --g800:#1f2937; --g900:#111827;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* NAV */
.topnav{background:var(--navy-dark);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topnav-brand{color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
.topnav-right{display:flex;align-items:center;gap:12px;}
.badge-alert{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}

/* LAYOUT */
.app{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 52px);}

/* SIDEBAR */
.sidebar{background:#fff;border-right:1px solid var(--g200);overflow-y:auto;}
.sb-section{padding:14px;border-bottom:1px solid var(--g100);}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g400);margin-bottom:8px;}
.stage-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border:none;background:transparent;border-radius:8px;margin-bottom:3px;transition:all .12s;}
.stage-btn:hover{background:var(--g50);}
.stage-btn.active{background:var(--navy-light);}
.sb-left{display:flex;align-items:center;gap:8px;}
.sb-icon{font-size:16px;}
.sb-label{font-size:13px;font-weight:600;color:var(--g800);}
.sb-right{display:flex;align-items:center;gap:5px;}
.sb-count{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--g500);background:var(--g100);padding:1px 7px;border-radius:10px;}
.sb-overdue{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#fff;background:var(--red);padding:1px 5px;border-radius:10px;min-width:16px;text-align:center;}

/* CLIENT LIST */
.search-box{width:100%;padding:7px 10px;border:1px solid var(--g200);border-radius:8px;font-size:12px;outline:none;margin-bottom:8px;}
.search-box:focus{border-color:var(--navy);}
.client-list{list-style:none;}
.client-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .1s;}
.client-item:hover{background:var(--g50);}
.client-item.active{background:var(--navy-light);border-color:var(--navy);}
.ci-left{display:flex;flex-direction:column;min-width:0;}
.ci-name{font-size:13px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-sub{font-size:11px;color:var(--g400);margin-top:1px;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot.overdue{background:var(--red);}
.dot.due_today{background:var(--gold);}
.dot.on_track{background:var(--green);}
.dot.responded{background:var(--navy);}
.dot.needs_intro{background:var(--g300);}
.dot.resolved{background:var(--g300);}
.client-item.overdue-item{background:var(--red-light);border-color:var(--red);}
.client-item.overdue-item .ci-name{color:var(--red);}
.ci-overdue-tag{font-size:10px;font-weight:700;color:var(--red);background:var(--red-light);padding:1px 6px;border-radius:8px;margin-left:4px;}
.sb-overdue-active{outline:2px solid #fff;box-shadow:0 0 0 3px var(--red);}

/* ADD CLIENT BTN */
.add-btn{width:100%;padding:8px;border:2px dashed var(--g200);border-radius:8px;background:transparent;color:var(--g400);font-size:13px;font-weight:600;margin-top:8px;transition:all .12s;}
.add-btn:hover{border-color:var(--navy);color:var(--navy);}

/* MAIN */
.main{overflow-y:auto;padding:24px 28px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;transition:all .12s;white-space:nowrap;}
.btn-navy{background:var(--navy);color:#fff;}.btn-navy:hover{background:var(--navy-dark);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:#15803d;}
.btn-red{background:transparent;color:var(--g400);border:1px solid var(--g200);}.btn-red:hover{border-color:var(--red);color:var(--red);}
.btn-outline{background:transparent;color:var(--g600);border:1px solid var(--g200);}.btn-outline:hover{border-color:var(--navy);color:var(--navy);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:#b8862a;}

/* PROFILE HEADER */
.prof-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.prof-name{font-size:22px;font-weight:700;color:var(--g900);}
.prof-meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px;}
.prof-meta span{font-size:13px;color:var(--g500);display:flex;align-items:center;gap:4px;}
.prof-meta a{color:var(--navy);text-decoration:none;}
.prof-actions{display:flex;gap:6px;flex-shrink:0;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.info-card{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:16px 18px;}
.info-card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g400);margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--g50);}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:13px;color:var(--g500);}
.info-val{font-size:13px;font-weight:600;color:var(--g800);}
.info-val.muted{color:var(--g400);}
.stage-badge{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;padding:4px 12px;border-radius:8px;background:var(--navy-light);color:var(--navy);}
.days-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:2px 7px;border-radius:12px;}
.days-badge.overdue{background:var(--red-light);color:var(--red);}
.days-badge.ok{background:var(--green-light);color:var(--green);}

/* TIMELINE */
.timeline-card{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:20px;}
.timeline-title{font-size:15px;font-weight:700;color:var(--g900);margin-bottom:16px;}
.flow-stage{position:relative;padding-left:36px;padding-bottom:4px;}
.flow-stage::before{content:'';position:absolute;left:13px;top:28px;bottom:0;width:2px;background:var(--g200);}
.flow-stage:last-child::before{display:none;}
.flow-dot{position:absolute;left:5px;top:5px;width:18px;height:18px;border-radius:50%;border:3px solid var(--g300);background:#fff;z-index:2;}
.flow-dot.done{background:var(--green);border-color:var(--green);}
.flow-dot.done::after{content:'✓';color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;height:100%;}
.flow-dot.current{background:var(--navy);border-color:var(--navy);box-shadow:0 0 0 3px rgba(0,63,135,.2);}
.flow-dot.current::after{content:'';width:5px;height:5px;background:#fff;border-radius:50%;display:block;margin:3.5px auto;}
.flow-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.flow-label{font-size:13px;font-weight:700;color:var(--g900);}
.flow-label.pending{color:var(--g400);}
.flow-date{font-size:11px;color:var(--g400);font-family:'JetBrains Mono',monospace;}
.flow-dur{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;}
.flow-dur.fast{background:var(--green-light);color:var(--green);}
.flow-dur.slow{background:var(--gold-light);color:var(--gold);}
.flow-dur.overdue{background:var(--red-light);color:var(--red);}
.flow-events{margin:6px 0 14px;list-style:none;}
.flow-event{display:flex;align-items:flex-start;gap:6px;padding:4px 8px;border-radius:5px;font-size:12px;color:var(--g600);}
.flow-event:hover{background:var(--g50);}
.fe-icon{flex-shrink:0;font-size:13px;margin-top:1px;}
.fe-text{flex:1;line-height:1.3;}
.fe-date{flex-shrink:0;font-size:10px;color:var(--g400);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.flow-pending-desc{font-size:12px;color:var(--g400);padding:2px 0 14px;}

/* NEXT ACTION */
.next-action{background:var(--navy-light);border:2px solid var(--navy);border-radius:9px;padding:12px 14px;margin:6px 0 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.na-left{display:flex;align-items:center;gap:8px;}
.na-icon{font-size:18px;}
.na-text{font-size:12px;font-weight:600;color:var(--navy-dark);}
.na-sub{font-size:11px;color:var(--g500);margin-top:1px;}
.na-btns{display:flex;gap:5px;flex-shrink:0;}

/* MOVE STAGE */
.move-bar{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--g200);}
.move-bar label{font-size:13px;font-weight:600;color:var(--g600);}
.move-select{padding:5px 10px;border:1px solid var(--g200);border-radius:8px;font-size:13px;color:var(--g700);outline:none;}
.move-select:focus{border-color:var(--navy);}

/* NOTES */
.notes-area{width:100%;min-height:70px;padding:8px 10px;border:1px solid var(--g200);border-radius:8px;font-size:13px;color:var(--g700);resize:vertical;outline:none;margin-top:6px;}
.notes-area:focus{border-color:var(--navy);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.visible{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:14px;width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 10px 15px rgba(0,0,0,.1);}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:15px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:var(--g100);font-size:14px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--g200);display:flex;gap:6px;justify-content:flex-end;}

/* FORM */
.form-row{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);margin-bottom:4px;}
.form-input{width:100%;padding:8px 10px;border:1px solid var(--g200);border-radius:8px;font-size:13px;outline:none;}
.form-input:focus{border-color:var(--navy);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--g400);}
.empty-icon{font-size:42px;margin-bottom:10px;}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.pill.overdue{background:var(--red-light);color:var(--red);}
.pill.due_today{background:var(--gold-light);color:var(--gold);}
.pill.on_track{background:var(--green-light);color:var(--green);}
.pill.responded{background:var(--navy-light);color:var(--navy);}
.pill.needs_intro{background:var(--g100);color:var(--g500);}

/* ERROR DETAILS */
.error-box{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
.error-box textarea{width:100%;min-height:50px;padding:8px 10px;border:1px solid var(--g200);border-radius:8px;font-size:13px;color:var(--g700);resize:vertical;outline:none;font-family:inherit;margin-top:6px;}
.error-box textarea:focus{border-color:var(--navy);}

/* COMM LOG */
.comm-log{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:16px 18px;margin-top:14px;}
.comm-log-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g400);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.comm-entry{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--g50);font-size:13px;}
.comm-entry:last-child{border-bottom:none;}
.comm-date{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--g400);min-width:80px;margin-top:2px;}
.comm-agent{flex-shrink:0;font-weight:600;color:var(--navy);font-size:12px;min-width:40px;margin-top:2px;}
.comm-text{flex:1;color:var(--g700);line-height:1.4;}
.comm-add{display:flex;gap:6px;margin-top:10px;}
.comm-add input{flex-shrink:0;width:60px;padding:6px 8px;border:1px solid var(--g200);border-radius:6px;font-size:12px;outline:none;text-align:center;}
.comm-add input:focus{border-color:var(--navy);}
.comm-add textarea{flex:1;padding:6px 8px;border:1px solid var(--g200);border-radius:6px;font-size:12px;outline:none;resize:none;min-height:32px;font-family:inherit;}
.comm-add textarea:focus{border-color:var(--navy);}

/* MANUAL MESSAGE */
.manual-msg{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:18px;margin-top:16px;}
.manual-msg-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);margin-bottom:10px;}
.manual-msg input,.manual-msg textarea{width:100%;padding:8px 10px;border:1px solid var(--g200);border-radius:8px;font-size:13px;outline:none;font-family:inherit;margin-bottom:8px;}
.manual-msg input:focus,.manual-msg textarea:focus{border-color:var(--navy);}
.manual-msg textarea{min-height:80px;resize:vertical;}
.manual-btns{display:flex;gap:6px;margin-top:4px;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--g900);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

@media(max-width:900px){.app{grid-template-columns:1fr;}.sidebar{display:none;}}
</style>
</head>
<body>

<div class="topnav">
  <span class="topnav-brand">⚖️ MCL Client Manager</span>
  <div class="topnav-right">
    <span class="badge-alert" id="overdueGlobal">0 overdue</span>
    <button class="btn btn-outline btn-sm" onclick="syncData()" id="syncBtn" style="font-size:13px;">↻ Sync</button>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sb-section" id="stagesContainer"></div>
    <div class="sb-section">
      <div class="sb-title" id="stageClientsTitle">Clients</div>
      <input class="search-box" type="text" placeholder="Search clients..." id="searchInput" oninput="filterClients()">
      <ul class="client-list" id="clientList"></ul>
      <button class="add-btn" onclick="openAddModal()">+ Add Client</button>
    </div>
  </div>
  <div class="main" id="mainPanel">
    <div class="empty">
      <div class="empty-icon">👈</div>
      <p>Select a client from the sidebar to view their profile</p>
    </div>
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-head"><h3>Add New Client</h3><button class="modal-close" onclick="closeModal('addModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Full Name *</label><input class="form-input" id="addName"></div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Email</label><input class="form-input" id="addEmail" type="email"></div>
        <div class="form-row"><label class="form-label">Phone</label><input class="form-input" id="addPhone"></div>
      </div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Pipedrive ID</label><input class="form-input" id="addPipedrive"></div>
        <div class="form-row"><label class="form-label">Assigned To</label>
          <select class="form-input" id="addAssigned">
            <option value="">Select...</option>
            <option>Eric De La Rosa</option>
            <option>Cindy</option>
            <option>Carlos Salguera</option>
            <option>Kimberly Sanchez</option>
          </select>
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Starting Stage</label>
          <select class="form-input" id="addStage">
            <option value="need_to_call">📞 Need to Call</option>
          <option value="do_not_call">🚫 Do Not Call</option>
            <option value="lvm">📞 LVM</option>
            <option value="contacted">💬 Contacted</option>
            <option value="waiting_mcl">⏳ Waiting on MCL</option>
            <option value="packet_sent">📬 Packet Sent</option>
            <option value="disputes_mailed">📮 Disputes Mailed</option>
            <option value="waiting_reports">📊 Waiting on Reports</option>
            <option value="litigation">⚖️ Litigation</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">Intro Type</label>
          <select class="form-input" id="addIntroType">
            <option value="no_answer">No Answer</option>
            <option value="lvm">Left Voicemail</option>
            <option value="spoke">Spoke</option>
          </select>
        </div>
      </div>
      <div class="form-row"><label class="form-label">Notes</label><textarea class="form-input" id="addNotes" rows="2"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-navy" onclick="addClient()">Add Client →</button>
    </div>
  </div>
</div>

<!-- SEND EMAIL MODAL -->
<div class="modal-bg" id="sendModal">
  <div class="modal">
    <div class="modal-head"><h3 id="sendModalTitle">Send Follow-up</h3><button class="modal-close" onclick="closeModal('sendModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><label class="form-label">Template</label><div id="sendTemplateInfo" style="font-size:13px;color:var(--g700);padding:8px 10px;background:var(--g50);border-radius:8px;"></div></div>
      <div class="form-row"><label class="form-label">Subject</label><div id="sendSubject" style="font-size:13px;color:var(--g700);padding:8px 10px;background:var(--g50);border-radius:8px;"></div></div>
      <div class="form-row"><label class="form-label">Preview</label><div id="sendPreview" style="font-size:13px;color:var(--g700);padding:12px;background:var(--g50);border-radius:8px;max-height:180px;overflow-y:auto;line-height:1.5;"></div></div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
        <input type="checkbox" id="sendAlsoSms" checked style="width:16px;height:16px;">
        <label for="sendAlsoSms" style="font-size:13px;color:var(--g600);">Also send matching SMS</label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('sendModal')">Cancel</button>
      <button class="btn btn-navy" id="sendConfirmBtn" onclick="confirmSend()">Send →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- CUSTOM PROMPT MODAL -->
<div id="customPromptOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:10000;justify-content:center;align-items:center;">
  <div style="background:#fff;border-radius:12px;padding:24px 28px;max-width:460px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.3);">
    <div id="customPromptTitle" style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:12px;"></div>
    <div id="customPromptMsg" style="font-size:14px;color:var(--g600);margin-bottom:16px;white-space:pre-line;"></div>
    <input id="customPromptInput" style="width:100%;padding:10px 12px;border:2px solid var(--g200);border-radius:8px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;" />
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
      <button id="customPromptCancel" style="padding:8px 20px;border:1px solid var(--g200);border-radius:8px;background:#fff;color:var(--g600);font-size:14px;cursor:pointer;">Cancel</button>
      <button id="customPromptOk" style="padding:8px 20px;border:none;border-radius:8px;background:var(--navy);color:#fff;font-size:14px;font-weight:600;cursor:pointer;">OK</button>
    </div>
  </div>
</div>

<!-- DID THEY ANSWER MODAL -->

// Custom prompt that stays on screen — won't dismiss on click-off
function customPrompt(message, defaultVal) {
  return new Promise((resolve) => {
    const overlay = document.getElementById('customPromptOverlay');
    const input = document.getElementById('customPromptInput');
    const msgEl = document.getElementById('customPromptMsg');
    const titleEl = document.getElementById('customPromptTitle');
    const okBtn = document.getElementById('customPromptOk');
    const cancelBtn = document.getElementById('customPromptCancel');
    
    const lines = message.split('\n');
    titleEl.textContent = lines[0];
    msgEl.textContent = lines.slice(1).join('\n').trim();
    input.value = defaultVal || '';
    input.placeholder = '';
    input.style.display = 'block';
    overlay.style.display = 'flex';
    input.focus();
    input.select();
    
    function cleanup() {
      overlay.style.display = 'none';
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      input.removeEventListener('keydown', onKey);
    }
    function onOk() { cleanup(); resolve(input.value); }
    function onCancel() { cleanup(); resolve(null); }
    function onKey(e) { if (e.key === 'Enter') onOk(); if (e.key === 'Escape') onCancel(); }
    
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
    input.addEventListener('keydown', onKey);
  });
}

async function syncData() {
  const btn = document.getElementById('syncBtn');
  if (btn) { btn.textContent = '⟳ Syncing...'; btn.disabled = true; }
  
  try {
    // 1. Load current DB data
    await loadData();
    
    // 2. Fetch Google Sheet CSV
    const csvResp = await fetch(SHEET_CSV_URL);
    if (!csvResp.ok) throw new Error('Sheet fetch failed: ' + csvResp.status);
    const csvText = await csvResp.text();
    const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
    
    const sheetRows = parsed.data.filter(r => r.Name && r.Name.trim());
    console.log('Sheet rows with names:', sheetRows.length);
    
    let inserted = 0, updated = 0, errors = 0;
    
    for (const row of sheetRows) {
      const name = row.Name.trim();
      if (!name) continue;
      
      // Determine correct stage from sheet columns
      const introMade = (row['Intro Made'] || '').trim().toUpperCase() === 'TRUE';
      const mclContact = (row['MCL Initial Contact'] || '').trim().toUpperCase() === 'TRUE';
      const notEligible = (row['Not Eligible'] || '').trim().toUpperCase() === 'TRUE';
      const disputeMailedToClient = (row['Dispute Mailed to Client'] || '').trim();
      const clientConfirmedMailed = (row['Client Confirmed Dispute Mailed'] || '').trim();
      const dueDate = (row['Due Date'] || '').trim();
      
      let stage = 'need_to_call';
      let outcome = null;
      
      if (notEligible) {
        stage = 'lost';
        outcome = 'lost';
      } else if (clientConfirmedMailed && dueDate) {
        // Client mailed disputes AND we have a due date
        const dueParsed = parseDate(dueDate);
        if (dueParsed && new Date(dueParsed) <= new Date()) {
          stage = 'waiting_reports'; // Due date passed — time to request reports
        } else {
          stage = 'disputes_mailed'; // Still waiting for due date
        }
      } else if (clientConfirmedMailed) {
        stage = 'disputes_mailed';
      } else if (disputeMailedToClient) {
        stage = 'packet_sent';
      } else if (mclContact) {
        stage = 'waiting_mcl';
      } else if (introMade) {
        stage = 'contacted';
      } else {
        stage = 'need_to_call';
      }
      
      // Parse dates (MM/DD/YYYY → YYYY-MM-DD)
      function parseDate(d) {
        if (!d) return null;
        const p = d.split('/');
        if (p.length !== 3) return null;
        const yr = p[2].length === 2 ? '20' + p[2] : p[2];
        return yr + '-' + p[0].padStart(2,'0') + '-' + p[1].padStart(2,'0');
      }
      
      const email = (row['Client Email'] || '').trim();
      const phone = (row['Phone Number'] || '').trim();
      const mclNotes = (row['McL Notes'] || '').trim();
      const joesNotes = (row['Joes Notes'] || '').trim();
      const additionalNotes = (row['Additional Notes'] || row['Additional Notes '] || '').trim();
      const combinedNotes = [joesNotes, additionalNotes].filter(Boolean).join(' | ');
      
      // Build update object
      const updateData = { stage };
      if (outcome) { updateData.outcome = outcome; updateData.outcome_at = new Date().toISOString(); }
      if (email) updateData.email = email;
      if (phone) updateData.phone = phone;
      if (mclNotes) updateData.error_details = mclNotes;
      if (combinedNotes) updateData.notes = combinedNotes;
      if (disputeMailedToClient) updateData.disputes_mailed_to_client = parseDate(disputeMailedToClient);
      if (clientConfirmedMailed) updateData.disputes_mailed_to_cra = parseDate(clientConfirmedMailed);
      if (dueDate) updateData.round_over_date = parseDate(dueDate);
      
      // Find existing client by name (case-insensitive)
      const nameLower = name.toLowerCase();
      const existing = clients.find(c => c.name.toLowerCase() === nameLower);
      
      if (existing) {
        // SKIP clients with any outcome — once resolved, stays resolved
        if (existing.outcome) { continue; }
        
        // Only update stage if sheet has a "higher" stage (don't move backwards due to stale sheet)
        const stageOrder = ['need_to_call','do_not_call','lvm','contacted','waiting_mcl','packet_sent','disputes_mailed','waiting_reports','litigation'];
        const existingIdx = stageOrder.indexOf(existing.stage);
        const sheetIdx = stageOrder.indexOf(stage);
        
        // Update stage if sheet says further along OR if current stage isn't in our list
        if (sheetIdx >= existingIdx || existingIdx === -1) {
          // Keep the stage from sheet
        } else {
          // Don't regress — keep existing stage
          delete updateData.stage;
        }
        
        // Don't overwrite outcome if already set
        if (existing.outcome && !outcome) {
          delete updateData.outcome;
          delete updateData.outcome_at;
        }
        
        // Don't blank out fields
        if (!email) delete updateData.email;
        if (!phone) delete updateData.phone;
        
        const { error } = await sb.from('mcl_clients').update(updateData).eq('id', existing.id);
        if (error) { console.error('Update error for', name, error); errors++; }
        else updated++;
      } else {
        // Check if this client was previously deleted — don't re-create
        const { data: delLog } = await sb.from('mcl_activity_log').select('id').eq('action', 'deleted').ilike('details', '%' + name + '%').limit(1);
        if (delLog && delLog.length > 0) { continue; }
        
        // INSERT new client
        const insertData = {
          name,
          email: email || '',
          phone: phone || '',
          stage,
          error_details: mclNotes || '',
          notes: combinedNotes || '',
          intro_type: introMade ? 'spoke' : 'no_answer',
          disputes_mailed_to_client: parseDate(disputeMailedToClient),
          disputes_mailed_to_cra: parseDate(clientConfirmedMailed),
          round_over_date: parseDate(dueDate),
        };
        if (outcome) { insertData.outcome = outcome; insertData.outcome_at = new Date().toISOString(); }
        
        const { error } = await sb.from('mcl_clients').insert(insertData);
        if (error) { console.error('Insert error for', name, error); errors++; }
        else inserted++;
      }
    }
    
    // Reload to show changes
    await loadData();
    
    let msg = `Synced ✓ — ${sheetRows.length} sheet rows`;
    if (inserted) msg += `, ${inserted} new`;
    if (updated) msg += `, ${updated} updated`;
    if (errors) msg += `, ${errors} errors`;
    msg += ` — ${clients.length} total in DB`;
    toast(msg);
    console.log(msg);
    
  } catch(e) {
    console.error('SYNC FAILED:', e);
    toast('Sync failed: ' + e.message);
  }
  if (btn) { btn.textContent = '↻ Sync'; btn.disabled = false; }
}

// RENDER STAGES

function renderStages() {
  const container = document.getElementById('stagesContainer');
  container.innerHTML = '<div class="sb-title">Pipeline</div>';
  STAGES.forEach(s => {
    const stageClients = clients.filter(c => {
      if (s.key === 'do_not_call') return c.stage === 'do_not_call' && !c.outcome;
      if (s.key === 'won') return c.outcome === 'won' || (c.stage === 'won' && !c.outcome);
      if (s.key === 'litigation') return c.outcome === 'litigation';
      if (s.key === 'lost') return c.outcome === 'lost';
      return c.stage === s.key && !c.outcome;
    });
    const overdue = s.key === 'do_not_call' 
      ? stageClients.filter(c => c.next_followup_date && new Date(c.next_followup_date) <= new Date()).length 
      : stageClients.filter(c => {
          if (c.pause_reason) return false;
          if (c.next_followup_date) return new Date(c.next_followup_date) <= new Date();
          return c.follow_up_status === 'overdue';
        }).length;
    const btn = document.createElement('button');
    btn.className = 'stage-btn' + (s.key === currentStage && !overdueOnly ? ' active' : '');
    btn.onclick = () => { currentStage = s.key; overdueOnly = false; currentClientId = null; document.getElementById('searchInput').value = ''; renderStages(); renderClientList(); renderEmptyMain(); };
    
    const countSpan = document.createElement('span');
    countSpan.className = 'sb-count';
    countSpan.textContent = stageClients.length;

    const leftSpan = document.createElement('span');
    leftSpan.className = 'sb-left';
    leftSpan.innerHTML = '<span class="sb-icon">' + s.icon + '</span><span class="sb-label">' + s.label + '</span>';

    const rightSpan = document.createElement('span');
    rightSpan.className = 'sb-right';
    rightSpan.appendChild(countSpan);

    if (overdue > 0) {
      const odSpan = document.createElement('span');
      odSpan.className = 'sb-overdue' + (s.key === currentStage && overdueOnly ? ' sb-overdue-active' : '');
      odSpan.textContent = overdue;
      odSpan.style.cursor = 'pointer';
      odSpan.onclick = function(e) {
        e.stopPropagation();
        currentStage = s.key;
        overdueOnly = true;
        currentClientId = null;
        renderStages();
        renderClientList();
        renderEmptyMain();
      };
      rightSpan.appendChild(odSpan);
    }

    btn.appendChild(leftSpan);
    btn.appendChild(rightSpan);
    container.appendChild(btn);
  });
}

// RENDER CLIENT LIST
// ═══════════════════════════════════════════════════
function renderClientList() {
  filterClients();
}

function getStageClients() {
  let list;
  if (currentStage === 'do_not_call') list = clients.filter(c => c.stage === 'do_not_call' && !c.outcome);
  else if (currentStage === 'won') list = clients.filter(c => c.outcome === 'won' || (c.stage === 'won' && !c.outcome));
  else if (currentStage === 'litigation') list = clients.filter(c => c.outcome === 'litigation');
  else if (currentStage === 'lost') list = clients.filter(c => c.outcome === 'lost');
  else list = clients.filter(c => c.stage === currentStage && !c.outcome);
  if (overdueOnly) list = list.filter(c => {
    if (c.pause_reason) return false;
    if (currentStage === 'do_not_call') return c.next_followup_date && new Date(c.next_followup_date) <= new Date();
    if (c.next_followup_date) return new Date(c.next_followup_date) <= new Date();
    return c.follow_up_status === 'overdue';
  });
  // Sort: overdue first, then due_today, then on_track
  const priority = { overdue: 0, due_today: 1, needs_intro: 2, on_track: 3, responded: 4, resolved: 5 };
  list.sort((a, b) => (priority[a.follow_up_status] || 9) - (priority[b.follow_up_status] || 9) || (b.days_since_contact || 0) - (a.days_since_contact || 0));
  return list;
}

function renderFilteredClients(list) {
  const ul = document.getElementById('clientList');
  ul.innerHTML = '';
  if (!list.length) { ul.innerHTML = '<div style="text-align:center;padding:20px;color:var(--g400);font-size:13px;">No clients</div>'; return; }
  list.forEach(c => {
    const li = document.createElement('li');
    li.className = 'client-item' + (c.id === currentClientId ? ' active' : '');
    li.onclick = () => { currentClientId = c.id; renderClientList(); renderProfile(c.id); };
    const fuLabel = c.last_followup === 'none' ? 'No contact' : c.last_followup === 'intro' ? 'Intro sent' : `FU #${c.last_followup.replace('fu','')}`;
    const daysLabel = c.days_since_contact != null ? `${c.days_since_contact}d ago` : 'never';
    const scheduledDue = c.next_followup_date && new Date(c.next_followup_date) <= new Date();
    const isOverdue = scheduledDue || (c.follow_up_status === 'overdue' && c.stage !== 'do_not_call' && !c.pause_reason && !c.next_followup_date);
    if (isOverdue) li.classList.add('overdue-item');
    li.innerHTML = `
      <div class="ci-left">
        <div class="ci-name">${c.name}${isOverdue ? '<span class="ci-overdue-tag">OVERDUE</span>' : ''}</div>
        <div class="ci-sub">${scheduledDue ? '🔴 Follow-up due!' : c.next_followup_date ? '📅 Follow-up: ' + new Date(c.next_followup_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : fuLabel + ' · ' + daysLabel}${isOverdue && !scheduledDue ? ' · ⚠️ ' + (c.days_since_contact || '?') + 'd overdue' : ''}</div>
      </div>
      <div><span class="dot ${c.follow_up_status}"></span></div>`;
    ul.appendChild(li);
  });
}

function filterClients() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) {
    // Global search: ALL clients except lost/deleted, regardless of current pipeline
    const all = clients.filter(c => c.outcome !== 'lost' && (c.name.toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) || (c.phone||'').toLowerCase().includes(q)));
    document.getElementById('stageClientsTitle').textContent = `🔍 "${q}" — ${all.length} results`;
    renderFilteredClients(all);
  } else {
    const stageClients = getStageClients();
    document.getElementById('stageClientsTitle').textContent = `${STAGE_ICONS[currentStage]||'🏁'} ${STAGES.find(s=>s.key===currentStage)?.label||'Clients'}${overdueOnly ? ' (Overdue Only)' : ''} — ${stageClients.length}`;
    renderFilteredClients(stageClients);
  }
}

function renderProfile(clientId) {

function renderTimeline(c) {
  let html = '';
  const events = [];
  
  // Intro
  if (c.intro_sent_at) events.push({ type: 'intro', label: 'Intro email + SMS sent', date: c.intro_sent_at, icon: '📧' });
  if (c.fu1_sent_at) events.push({ type: 'fu1', label: 'Follow-up #1 sent', date: c.fu1_sent_at, icon: '📧' });
  if (c.fu2_sent_at) events.push({ type: 'fu2', label: 'Follow-up #2 sent', date: c.fu2_sent_at, icon: '📧' });
  if (c.fu3_sent_at) events.push({ type: 'fu3', label: 'Follow-up #3 sent', date: c.fu3_sent_at, icon: '📧' });
  if (c.fu4_sent_at) events.push({ type: 'fu4', label: 'Follow-up #4 sent', date: c.fu4_sent_at, icon: '📧' });

  // Current stage
  const stageIcon = STAGE_ICONS[c.stage];
  const stageLabel = STAGES.find(s=>s.key===c.stage)?.label || c.stage;
  const daysInStage = c.days_in_stage || 0;
  const durClass = daysInStage > 14 ? 'overdue' : daysInStage > 7 ? 'slow' : 'fast';

  html += `<div class="flow-stage">
    <div class="flow-dot current"></div>
    <div class="flow-head">
      <span class="flow-label">${stageIcon} ${stageLabel}</span>
      <span class="flow-date">${fmtDate(c.intro_sent_at || c.created_at)} → now</span>
      <span class="flow-dur ${durClass}">${daysInStage} days</span>
    </div>
    <ul class="flow-events">
      ${events.length === 0 ? `<li class="flow-event"><span class="fe-icon">⚪</span><span class="fe-text">No follow-ups sent yet</span></li>` : ''}
      ${events.map(e => `<li class="flow-event"><span class="fe-icon">${e.icon}</span><span class="fe-text">${e.label}</span><span class="fe-date">${fmtDate(e.date)}</span><button class="btn btn-outline btn-sm" onclick="resendFollowup('${c.id}','${e.type}')" style="font-size:10px;padding:2px 8px;margin-left:6px;">↻ Resend</button></li>`).join('')}
    </ul>`;

  // Next action
  const hasFutureSchedule = c.next_followup_date && new Date(c.next_followup_date) > new Date();
  if (!c.responded && !c.outcome && c.stage !== 'do_not_call' && !c.pause_reason && !hasFutureSchedule) {
    const lastFu = c.last_followup || 'none';
    const fuKeys = getTemplateKeys(c.stage, lastFu);
    if (fuKeys.email) {
      const tpl = templates.find(t => t.key === fuKeys.email);
      const nextNum = lastFu === 'none' ? 'Intro' : `FU #${parseInt(lastFu.replace('fu','')) + 1}`;
      const dueText = c.follow_up_status === 'overdue' ? `🔴 OVERDUE — ${c.days_since_contact} days since last contact` : c.follow_up_status === 'due_today' ? '🟡 Due today' : `🟢 Due in ${Math.max(0, 5 - (c.days_since_contact || 0))} days (4 biz days)`;
      html += `<div class="next-action">
        <div class="na-left"><span class="na-icon">${c.follow_up_status === 'overdue' ? '🔴' : '📨'}</span>
          <div><div class="na-text">Next: Send ${nextNum}${tpl ? ` — "${tpl.subject}"` : ''}</div><div class="na-sub">${dueText}</div></div>
        </div>
        <div class="na-btns">
          <button class="btn btn-navy btn-sm" onclick="openSendModal('${c.id}','email')">📧 Send Email</button>
          <button class="btn btn-green btn-sm" onclick="openSendModal('${c.id}','sms')">💬 Send Text</button>
        </div>
      </div>`;
    } else {
      html += `<div class="next-action">
        <div class="na-left"><span class="na-icon">✅</span>
          <div><div class="na-text">All follow-ups sent</div><div class="na-sub">Consider calling again or marking as Won/Lost</div></div>
        </div>
        <div class="na-btns">
          <button class="btn btn-red btn-sm" onclick="markOutcome('${c.id}','lost')">✗ Lost</button>
        </div>
      </div>`;
    }
  } else if (c.responded) {
    html += `<div class="next-action" style="border-color:var(--green);background:var(--green-light);">
      <div class="na-left"><span class="na-icon">✅</span>
        <div><div class="na-text" style="color:var(--green);">Client responded ${c.responded_at ? 'on ' + fmtDate(c.responded_at) : ''}</div></div>
      </div>
    </div>`;
  }
  html += `</div>`;

  // Pending stages
  const allStages = ['need_to_call','do_not_call','lvm','contacted','waiting_mcl','packet_sent','disputes_mailed','waiting_reports'];
  const currentIdx = allStages.indexOf(c.stage);
  for (let i = currentIdx + 1; i < allStages.length; i++) {
    const ps = STAGES.find(s => s.key === allStages[i]);
    const descs = {
      do_not_call: 'On hold — do not contact yet',
      lvm: 'Left voicemail — awaiting callback',
      contacted: 'Spoke with client — awaiting MCL email reply',
      waiting_mcl: 'Client agreed — McCarthy Law reviewing',
      packet_sent: 'Dispute packet sent to client',
      disputes_mailed: 'Client mailed disputes to bureaus',
      waiting_reports: '30 days done — need updated reports',
    };
    html += `<div class="flow-stage"><div class="flow-dot"></div>
      <div class="flow-head"><span class="flow-label pending">${ps.icon} ${ps.label}</span></div>
      <div class="flow-pending-desc">${descs[allStages[i]] || ''}</div></div>`;
  }
  html += `<div class="flow-stage"><div class="flow-dot"></div>
    <div class="flow-head"><span class="flow-label pending">🏁 Won or Lost</span></div>
    <div class="flow-pending-desc">Final outcome</div></div>`;

  return html;
}

async function addClient() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { toast('Name is required'); return; }
  const { data, error } = await sb.from('mcl_clients').insert({
    name,
    email: document.getElementById('addEmail').value.trim() || null,
    phone: document.getElementById('addPhone').value.trim() || null,
    pipedrive_id: document.getElementById('addPipedrive').value.trim() || null,
    assigned_to: document.getElementById('addAssigned').value || null,
    stage: document.getElementById('addStage').value,
    intro_type: document.getElementById('addIntroType').value,
    notes: document.getElementById('addNotes').value.trim() || null,
  }).select().single();
  if (error) { toast('Error: ' + error.message); return; }
  closeModal('addModal');
  toast('Client added ✓');
  currentStage = data.stage;
  currentClientId = data.id;
  await loadData();
}

async function markResponded(id) {
  await sb.from('mcl_clients').update({ responded: true, responded_at: new Date().toISOString() }).eq('id', id);
  await sb.from('mcl_activity_log').insert({ client_id: id, action: 'responded', details: 'Manually marked as responded' });
  toast('Marked as responded ✓');
  await loadData();
  renderProfile(id);
}

async function mclResponded(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  if (!(await customConfirm('Confirm: ' + c.name + ' responded to McCarthy Law email?\n\nThis will:\n• Update the Google Sheet with client email & phone\n• Move client to Waiting on MCL'))) return;

  // Update Google Sheet with client contact info via Zapier
  try {
    const params = new URLSearchParams();
    params.append('Name', c.name);
    params.append('Client Email', c.email || '');
    params.append('Phone Number', c.phone || '');
    params.append('Action', 'mcl_responded');
    await fetch(SHEET_UPDATE_URL, { method: 'POST', body: params });
    toast('Sheet updated with client info ✓');
  } catch (e) { toast('Sheet update failed: ' + e.message); }

  // Move to waiting_mcl
  await sb.from('mcl_clients').update({ stage: 'waiting_mcl', responded: true, responded_at: new Date().toISOString() }).eq('id', id);
  if (c.pipedrive_id) await updatePipedriveLabel(c.pipedrive_id, 'waiting_mcl');

  // Log it
  const log = c.comm_log || [];
  const now = new Date();
  const dateStr = (now.getMonth()+1).toString().padStart(2,'0') + '/' + now.getDate().toString().padStart(2,'0');
  log.push({ date: dateStr, agent: 'SYS', text: '⚖️ Client responded to MCL email — updated sheet with contact info, moved to Waiting on MCL' });
  await sb.from('mcl_clients').update({ comm_log: log }).eq('id', id);
  await sb.from('mcl_activity_log').insert({ client_id: id, action: 'mcl_responded', details: 'Client responded to MCL email - sheet updated with contact info' });

  await loadData();
  renderProfile(id);
}

async function scheduleFollowup(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  const dateStr = await customPrompt('Schedule next follow-up for ' + c.name + '\n\nEnter a date (MM/DD/YYYY):');
  if (!dateStr) return;
  const parts = dateStr.split('/');
  if (parts.length !== 3) { toast('Invalid date format — use MM/DD/YYYY'); return; }
  const yr = parts[2].length === 2 ? '20' + parts[2] : parts[2];
  const isoDate = yr + '-' + parts[0].padStart(2,'0') + '-' + parts[1].padStart(2,'0');
  await sb.from('mcl_clients').update({ next_followup_date: isoDate }).eq('id', id);
  const log = c.comm_log || [];
  const now = new Date();
  const ds = (now.getMonth()+1).toString().padStart(2,'0') + '/' + now.getDate().toString().padStart(2,'0');
  log.push({ date: ds, agent: 'SYS', text: '📅 Follow-up scheduled for ' + dateStr });
  await sb.from('mcl_clients').update({ comm_log: log }).eq('id', id);
  await sb.from('mcl_activity_log').insert({ client_id: id, action: 'followup_scheduled', details: 'Follow-up scheduled for ' + dateStr });
  toast('Follow-up scheduled for ' + dateStr + ' ✓');
  await loadData();
  renderProfile(id);
}

async function clearFollowupDate(id) {
  if (!(await customConfirm('Clear the scheduled follow-up date?'))) return;
  await sb.from('mcl_clients').update({ next_followup_date: null }).eq('id', id);
  toast('Follow-up date cleared ✓');
  await loadData();
  renderProfile(id);
}

async function pauseClient(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;

// PIPEDRIVE LABEL SYNC
// ═══════════════════════════════════════════════════
// PIPEDRIVE — all calls go through Netlify proxy to avoid CORS
// ═══════════════════════════════════════════════════
async function loadPipedriveLabels() {
  try {
    const res = await fetch(PIPEDRIVE_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'load_labels' })
    });
    const data = await res.json();
    if (!data.success) { console.error('Pipedrive load_labels error:', data); return; }
    data.options.forEach(opt => { pipedriveLabels[opt.label] = opt.id; });
    console.log('Pipedrive labels loaded via proxy:', Object.keys(pipedriveLabels).length);
  } catch (e) { console.error('Failed to load Pipedrive labels:', e); }
}

async function ensurePipedriveLabel(labelName) {
  if (pipedriveLabels[labelName]) return pipedriveLabels[labelName];
  const colors = ['blue','green','red','yellow','purple','gray','orange','pink','cyan','brown'];
  const color = colors[Object.keys(pipedriveLabels).length % colors.length];
  try {
    const res = await fetch(PIPEDRIVE_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'ensure_label', labelName, color })
    });
    const data = await res.json();
    if (data.success && data.options) {
      data.options.forEach(opt => { pipedriveLabels[opt.label] = opt.id; });
      return pipedriveLabels[labelName] || null;
    }
  } catch (e) { console.error('Failed to create Pipedrive label:', e); }
  return null;
}

async function updatePipedriveLabel(dealId, stage) {
  if (!dealId) return;
  const labelName = MCL_LABELS[stage];
  if (!labelName) return;

  let labelId = pipedriveLabels[labelName];
  if (!labelId) labelId = await ensurePipedriveLabel(labelName);
  if (!labelId) { console.error('Could not find/create label:', labelName); return; }

  // Build array of all known McCarthy label IDs
  const mclLabelIds = Object.values(MCL_LABELS)
    .map(name => pipedriveLabels[name])
    .filter(Boolean)
    .map(String);

  try {
    const res = await fetch(PIPEDRIVE_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update_label', dealId, labelId: String(labelId), mclLabelIds })
    });
    const data = await res.json();
    if (data.success) {
      console.log('Pipedrive label updated via proxy:', labelName, 'on deal', dealId);
    } else {
      console.error('Pipedrive label update failed:', data);
      toast('⚠️ Pipedrive label update failed — check deal ID');
    }
  } catch (e) { console.error('Pipedrive proxy error:', e); toast('⚠️ Pipedrive sync failed'); }
}

async function moveStage(id) {
  const newStage = document.getElementById('moveSelect').value;
  const c = clients.find(x => x.id === id);
  if (!c || c.stage === newStage) return;
  
  // Require Deal ID before moving
  if (!c.pipedrive_id) {
    let dealId = null;
    while (true) {
      dealId = await customPrompt('Pipedrive Deal ID is required (6 digits).\n\nEnter the Deal ID for ' + c.name + ':');
      if (!dealId) { toast('Move cancelled — Deal ID required'); return; }
      if (/^\d{6}$/.test(dealId.replace(/\D/g, ''))) break;
      toast('Deal ID must be exactly 6 digits');
    }
    dealId = dealId.replace(/\D/g, '');
    await sb.from('mcl_clients').update({ pipedrive_id: dealId }).eq('id', id);
    c.pipedrive_id = dealId;
  }
  
  // Require email and phone before moving (except to lost)
  if (newStage !== 'lost') {
    if (!c.email) {
      let email = null;
      while (true) {
        email = await customPrompt('Email is required before moving ' + c.name + '.\n\nEnter their email:');
        if (!email) { toast('Move cancelled — email required'); return; }
        if (email.includes('@')) break;
        toast('Invalid email — must contain @');
      }
      await sb.from('mcl_clients').update({ email }).eq('id', id);
      c.email = email;
    }
    if (!c.phone) {
      let phone = null;
      while (true) {
        phone = await customPrompt('Phone number is required before moving ' + c.name + '.\n\nEnter their phone (10 digits):');
        if (!phone) { toast('Move cancelled — phone required'); return; }
        const digits = phone.replace(/\D/g, '');
        if (digits.length >= 10 && digits.length <= 11) break;
        toast('Invalid phone — must be 10-11 digits');
      }
      await sb.from('mcl_clients').update({ phone }).eq('id', id);
      c.phone = phone;
    }
  }
  
  // Reset follow-up tracking when moving to new stage
  const updateData = {
    stage: newStage,
    intro_sent_at: null, fu1_sent_at: null, fu2_sent_at: null, fu3_sent_at: null, fu4_sent_at: null,
    responded: false, responded_at: null,
  };
  
  // If moving to Do Not Call, ask for reason and follow-up date
  if (newStage === 'do_not_call') {
    const reason = await customPrompt('Why is this client being moved to Do Not Call?\n\n(e.g. "In active services", "Client requested no contact until April")');
    if (!reason) { toast('Move cancelled — reason required'); return; }
    const dateStr = await customPrompt('When should we follow up with this client?\n\nEnter a date (MM/DD/YYYY):\n\nThis client will turn red on this date as a reminder.');
    if (!dateStr) { toast('Move cancelled — follow-up date required'); return; }
    const parts = dateStr.split('/');
    if (parts.length !== 3) { toast('Invalid date — use MM/DD/YYYY'); return; }
    const yr = parts[2].length === 2 ? '20' + parts[2] : parts[2];
    updateData.next_followup_date = yr + '-' + parts[0].padStart(2,'0') + '-' + parts[1].padStart(2,'0');
    updateData.pause_reason = reason;
  } else {
    // Moving to any other stage — clear scheduled follow-up and pause
    updateData.next_followup_date = null;
    updateData.pause_reason = null;
  }
  
  await sb.from('mcl_clients').update(updateData).eq('id', id);
  await sb.from('mcl_activity_log').insert({ client_id: id, action: 'stage_changed', details: `Moved from ${c.stage} to ${newStage}` });
  
  // Update Pipedrive label
  await updatePipedriveLabel(c.pipedrive_id, newStage);
  
  toast(`Moved to ${newStage} ✓`);
  currentStage = newStage;
  await loadData();
  renderProfile(id);
}

  // Validate fields
  if (field === 'email' && value && !value.includes('@')) {
    toast('Invalid email — must contain @'); return;
  }
  if (field === 'phone' && value) {
    const digits = value.replace(/\D/g, '');

  }
}

async function resendFollowup(clientId, fuType) {
  const c = clients.find(x => x.id === clientId);
  if (!c) return;
  
  // Map fuType back to lastFu for template lookup
  const prevMap = { intro: 'none', fu1: 'intro', fu2: 'fu1', fu3: 'fu2', fu4: 'fu3' };
  const lastFu = prevMap[fuType] || 'none';
  const fuKeys = getTemplateKeys(c.stage, lastFu);
  
  const emailTpl = templates.find(t => t.key === fuKeys.email);
  const smsTpl = templates.find(t => t.key === fuKeys.sms);
  const label = fuType === 'intro' ? 'Intro' : 'FU #' + fuType.replace('fu','');
  
  if (!(await customConfirm(`Resend ${label} to ${c.name}?\n\nEmail: ${emailTpl ? '✓ ' + emailTpl.subject : '✗ no template'}\nSMS: ${smsTpl ? '✓ will send' : '✗ no template'}`))) return;
  
  // Resend email
  if (emailTpl && c.email) {
    try {
      const body = emailTpl.body.replace(/\{name\}/g, c.name.split(' ')[0]).replace(/\{agent\}/g, c.assigned_to || 'ASAP Credit Repair');
      const res = await fetch(SEND_EMAIL_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: c.email, subject: emailTpl.subject, body })
      });
      const data = await res.json();
      if (data.ok) {
        await sb.from('mcl_activity_log').insert({ client_id: c.id, action: 'email_resent', template_key: emailTpl.key, details: 'Resent: ' + emailTpl.subject });
        const elog = c.comm_log || [];
        const now = new Date();
        elog.push({ date: (now.getMonth()+1).toString().padStart(2,'0') + '/' + now.getDate().toString().padStart(2,'0'), agent: 'SYS', text: '↻ Resent email: ' + emailTpl.subject });
        await sb.from('mcl_clients').update({ comm_log: elog }).eq('id', c.id);
        toast('Email resent ✓');
      } else { toast('Email error: ' + (data.error || 'unknown')); }
    } catch (e) { toast('Email failed: ' + e.message); }
  }
  
  // Resend SMS
  if (smsTpl && c.phone) {
    try {
      const smsBody = (smsTpl.body || '').replace(/\{name\}/g, c.name.split(' ')[0]).replace(/\{agent\}/g, c.assigned_to || 'ASAP Credit Repair');
      const smsParams = new URLSearchParams(); smsParams.append('SMS', smsBody); smsParams.append('Texting Cell', c.phone); smsParams.append('Person First Name', c.name.split(' ')[0]);
      await fetch(SEND_SMS_URL, { method: 'POST', body: smsParams });
      await sb.from('mcl_activity_log').insert({ client_id: c.id, action: 'sms_resent', template_key: smsTpl.key, details: 'Resent SMS: ' + smsTpl.name });
      const slog = c.comm_log || [];
      const snoww = new Date();
      slog.push({ date: (snoww.getMonth()+1).toString().padStart(2,'0') + '/' + snoww.getDate().toString().padStart(2,'0'), agent: 'SYS', text: '↻ Resent text: ' + smsTpl.name });
      await sb.from('mcl_clients').update({ comm_log: slog }).eq('id', c.id);
      toast('Text resent ✓');
    } catch (e) { toast('SMS failed: ' + e.message); }
  }
  
  if (!c.email && !c.phone) toast('No email or phone on file');
  await loadData();
}

function openSendModal(clientId, type) {
  const c = clients.find(x => x.id === clientId);
  if (!c) return;
  const lastFu = c.last_followup || 'none';
  const fuKeys = getTemplateKeys(c.stage, lastFu);
  const tplKey = type === 'sms' ? fuKeys.sms : fuKeys.email;
  const tpl = templates.find(t => t.key === tplKey);

  if (!tpl) { toast('No template found for this step'); return; }

  const nextNum = lastFu === 'none' ? 'Intro' : `Follow-up #${parseInt(lastFu.replace('fu','')) + 1}`;
  document.getElementById('sendModalTitle').textContent = `📧 Send ${nextNum} to ${c.name}`;
  document.getElementById('sendTemplateInfo').textContent = `${tpl.name} (${tpl.key})`;
  document.getElementById('sendSubject').textContent = tpl.subject || '(SMS - no subject)';

  // Replace {name} in preview
  const preview = (tpl.body || '').replace(/\{name\}/g, c.name.split(' ')[0]).replace(/\{agent\}/g, c.assigned_to || 'ASAP Credit Repair');
  document.getElementById('sendPreview').innerHTML = tpl.type === 'email' ? preview : preview.replace(/\n/g, '<br>');

  pendingSend = { clientId, emailKey: fuKeys.email, smsKey: fuKeys.sms, lastFu, type };
  document.getElementById('sendModal').classList.add('visible');
}

async function confirmSend() {
  if (!pendingSend) return;
  const c = clients.find(x => x.id === pendingSend.clientId);
  if (!c) return;

  const sendSms = document.getElementById('sendAlsoSms').checked;
  const emailTpl = templates.find(t => t.key === pendingSend.emailKey);
  const smsTpl = templates.find(t => t.key === pendingSend.smsKey);

  // Send email via SendGrid function
  if (emailTpl && c.email) {
    try {
      const body = emailTpl.body.replace(/\{name\}/g, c.name.split(' ')[0]).replace(/\{agent\}/g, c.assigned_to || '');
      const res = await fetch(SEND_EMAIL_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: c.email, subject: emailTpl.subject, body })
      });
      const data = await res.json();
      if (data.ok) {
        await sb.from('mcl_activity_log').insert({ client_id: c.id, action: 'email_sent', template_key: emailTpl.key, details: `Sent: ${emailTpl.subject}` });
      } else {
        toast('Email error: ' + (data.error || 'unknown'));
      }
    } catch (e) { toast('Email send failed: ' + e.message); }
  }

  // Send SMS via Zapier webhook
  if (sendSms && smsTpl && c.phone) {
    try {
      const smsBody = (smsTpl.body || '').replace(/\{name\}/g, c.name.split(' ')[0]).replace(/\{agent\}/g, c.assigned_to || 'ASAP Credit Repair');
      const smsParams = new URLSearchParams(); smsParams.append('SMS', smsBody); smsParams.append('Texting Cell', c.phone); smsParams.append('Person First Name', c.name.split(' ')[0]);
      await fetch(SEND_SMS_URL, { method: 'POST', body: smsParams });
      await sb.from('mcl_activity_log').insert({ client_id: c.id, action: 'sms_sent', template_key: smsTpl.key, details: 'SMS sent via Zapier: ' + smsTpl.name });
    } catch (e) { toast('SMS failed: ' + e.message); }
  }

  // Update follow-up timestamps
  const lastFu = pendingSend.lastFu;
  const updateField = lastFu === 'none' ? 'intro_sent_at' : lastFu === 'intro' ? 'fu1_sent_at' : lastFu === 'fu1' ? 'fu2_sent_at' : lastFu === 'fu2' ? 'fu3_sent_at' : lastFu === 'fu3' ? 'fu4_sent_at' : null;
  if (updateField) {
    await sb.from('mcl_clients').update({ [updateField]: new Date().toISOString() }).eq('id', c.id);
  }

  // Auto-lose after 5 follow-ups for need_to_call, lvm, contacted
  const autoLoseStages = ['need_to_call','lvm','contacted'];
  if (autoLoseStages.includes(c.stage)) {
    let fuCount = 0;
    if (c.intro_sent_at) fuCount++;
    if (c.fu1_sent_at) fuCount++;
    if (c.fu2_sent_at) fuCount++;
    if (c.fu3_sent_at) fuCount++;
    if (c.fu4_sent_at) fuCount++;
    if (fuCount >= 5) {
      await sb.from('mcl_clients').update({outcome:'lost',outcome_at:new Date().toISOString()}).eq('id',c.id);
      await sb.from('mcl_activity_log').insert({client_id:c.id,action:'lost',details:'Auto-lost: 5 follow-ups with no response'});
      if (c.pipedrive_id) await updatePipedriveLabel(c.pipedrive_id, 'lost');
      toast('Client moved to Lost — 5 attempts, no response');
      closeModal('sendModal');
      pendingSend = null;
      await loadData();
      return;
    }
  }
  closeModal('sendModal');
  toast('Sent ✓');

  // Show "Did they answer?" for Need to Call clients after intro
  if (c.stage === 'need_to_call' && pendingSend.lastFu === 'none') {
    pendingAnswerClientId = c.id;
    pendingSend = null;
    await loadData();
    document.getElementById('answerModal').classList.add('visible');
    return;
  }

  pendingSend = null;
  await loadData();
}

let pendingAnswerClientId = null;

async function callOutcome(id, result) {
  const c = clients.find(x => x.id === id);
  
  // Require email and phone before moving out of need_to_call (except no_answer which stays)
  if (result !== 'no_answer' && c) {
    if (!c.email) {
      let email = null;
      while (true) {
        email = await customPrompt('Email is required before moving ' + c.name + '.\n\nEnter their email:');
        if (!email) { toast('Move cancelled — email required'); return; }
        if (email.includes('@')) break;
        toast('Invalid email — must contain @');
      }
      await sb.from('mcl_clients').update({ email }).eq('id', id);
      c.email = email;
    }
    if (!c.phone) {
      let phone = null;
      while (true) {
        phone = await customPrompt('Phone number is required before moving ' + c.name + '.\n\nEnter their phone (10 digits):');
        if (!phone) { toast('Move cancelled — phone required'); return; }
        const digits = phone.replace(/\D/g, '');
        if (digits.length >= 10 && digits.length <= 11) break;
        toast('Invalid phone — must be 10-11 digits');
      }
      await sb.from('mcl_clients').update({ phone }).eq('id', id);
      c.phone = phone;
    }
  }
  
  if (result === 'spoke') {
    await sb.from('mcl_clients').update({ stage: 'contacted', intro_type: 'spoke' }).eq('id', id);
    await sb.from('mcl_activity_log').insert({ client_id: id, action: 'stage_change', details: 'Spoke with client → Contacted' });
    if (c && c.pipedrive_id) await updatePipedriveLabel(c.pipedrive_id, 'contacted');
    toast('Moved to Contacted ✓');
  } else if (result === 'lvm') {
    await sb.from('mcl_clients').update({ stage: 'lvm', intro_type: 'lvm' }).eq('id', id);
    await sb.from('mcl_activity_log').insert({ client_id: id, action: 'stage_change', details: 'Left voicemail → LVM' });
    if (c && c.pipedrive_id) await updatePipedriveLabel(c.pipedrive_id, 'lvm');
    toast('Moved to LVM ✓');
  }
  
  // Update sheet with contact info + Contacted flag for spoke/lvm
  if ((result === 'spoke' || result === 'lvm') && c) {
    try {
      const params = new URLSearchParams();
      params.append('Name', c.name);
      params.append('Client Email', c.email || '');
      params.append('Phone Number', c.phone || '');
      params.append('Contacted', 'TRUE');
      params.append('Action', 'contacted');
      await fetch(SHEET_UPDATE_URL, { method: 'POST', body: params });
    } catch (e) { console.error('Sheet webhook failed:', e); }
  }
  
  if (result === 'no_answer') {
    await sb.from('mcl_clients').update({ intro_type: 'no_answer' }).eq('id', id);
    await sb.from('mcl_activity_log').insert({ client_id: id, action: 'call_attempt', details: 'No answer, no voicemail' });
    toast('Logged — staying in Need to Call');
  }
  await loadData();
  renderProfile(id);
}

async function handleAnswer(result) {
  closeModal('answerModal');
  if (!pendingAnswerClientId) return;
  const id = pendingAnswerClientId;
  const c = clients.find(x => x.id === id);
  pendingAnswerClientId = null;

  // Require email and phone before moving (except no_answer)
  if (result !== 'no_answer' && c) {
    if (!c.email) {
      let email = null;
      while (true) {
        email = await customPrompt('Email is required before moving ' + c.name + '.\n\nEnter their email:');
        if (!email) { toast('Move cancelled — email required'); return; }
        if (email.includes('@')) break;
        toast('Invalid email — must contain @');
      }
      await sb.from('mcl_clients').update({ email }).eq('id', id);
      c.email = email;
    }
    if (!c.phone) {
      let phone = null;
      while (true) {
        phone = await customPrompt('Phone number is required before moving ' + c.name + '.\n\nEnter their phone (10 digits):');
        if (!phone) { toast('Move cancelled — phone required'); return; }
        const digits = phone.replace(/\D/g, '');
        if (digits.length >= 10 && digits.length <= 11) break;
        toast('Invalid phone — must be 10-11 digits');
      }
      await sb.from('mcl_clients').update({ phone }).eq('id', id);
      c.phone = phone;
    }
  }

  if (result === 'spoke') {
    await sb.from('mcl_clients').update({ stage: 'contacted', intro_type: 'spoke' }).eq('id', id);
    await sb.from('mcl_activity_log').insert({ client_id: id, action: 'stage_change', details: 'Spoke with client → Contacted' });
    if (c && c.pipedrive_id) await updatePipedriveLabel(c.pipedrive_id, 'contacted');
    toast('Moved to Contacted ✓');
  } else if (result === 'lvm') {
    await sb.from('mcl_clients').update({ stage: 'lvm', intro_type: 'lvm' }).eq('id', id);
    await sb.from('mcl_activity_log').insert({ client_id: id, action: 'stage_change', details: 'Left voicemail → LVM' });
    if (c && c.pipedrive_id) await updatePipedriveLabel(c.pipedrive_id, 'lvm');
    toast('Moved to LVM ✓');
  }
  
  // Update sheet with contact info + Contacted flag for spoke/lvm
  if ((result === 'spoke' || result === 'lvm') && c) {
    try {
      const params = new URLSearchParams();
      params.append('Name', c.name);
      params.append('Client Email', c.email || '');
      params.append('Phone Number', c.phone || '');
      params.append('Contacted', 'TRUE');
      params.append('Action', 'contacted');
      await fetch(SHEET_UPDATE_URL, { method: 'POST', body: params });
    } catch (e) { console.error('Sheet webhook failed:', e); }
  }
  
  if (result === 'no_answer') {
    await sb.from('mcl_clients').update({ intro_type: 'no_answer' }).eq('id', id);
    await sb.from('mcl_activity_log').insert({ client_id: id, action: 'call_attempt', details: 'No answer, no voicemail' });
    toast('Logged — staying in Need to Call');
  }
  await loadData();
  renderProfile(id);
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function statusLabel(s) {
  return { overdue: '⚠ Overdue', due_today: '● Due Today', on_track: '✓ On Track', responded: '✓ Responded', needs_intro: '○ Needs Intro', resolved: '● Resolved' }[s] || s;
}

function updateOverdueBadge() {
  const regularOverdue = clients.filter(c => c.follow_up_status === 'overdue' && c.stage !== 'do_not_call' && !c.pause_reason && !c.next_followup_date).length;
  const scheduledDue = clients.filter(c => c.next_followup_date && new Date(c.next_followup_date) <= new Date() && !c.outcome).length;
  const overdue = regularOverdue + scheduledDue;
  document.getElementById('overdueGlobal').textContent = overdue > 0 ? `${overdue} overdue` : '✓ All clear';
  document.getElementById('overdueGlobal').style.background = overdue > 0 ? 'var(--red)' : 'var(--green)';
}

function openAddModal() {
  document.getElementById('addName').value = '';
  document.getElementById('addEmail').value = '';
  document.getElementById('addPhone').value = '';
  document.getElementById('addPipedrive').value = '';
  document.getElementById('addAssigned').value = '';
  document.getElementById('addStage').value = currentStage === 'lost' ? 'need_to_call' : currentStage;
  document.getElementById('addIntroType').value = 'no_answer';
  document.getElementById('addNotes').value = '';
  document.getElementById('addModal').classList.add('visible');
}

function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Click outside modal to close
document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('visible'); });
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
loadData();
loadPipedriveLabels();

// Show sync reminder once per session
if (!sessionStorage.getItem('mcl_synced')) {
  setTimeout(async () => {
    const doSync = await customConfirm('Good morning! 👋\n\nPlease click OK to sync the app with the latest data before you start working.\n\nThis makes sure you have the most up-to-date client information.');
    if (doSync) {
      syncData();
    }
    sessionStorage.setItem('mcl_synced', 'true');
  }, 1500);
}
// Auto-refresh from DB every 60 seconds
setInterval(loadData, 60000);
// Auto-sync from Google Sheet every 5 minutes
setInterval(() => { console.log('Auto-sync from sheet...'); syncData(); }, 300000);
</script>
